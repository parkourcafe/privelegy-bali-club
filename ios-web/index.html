<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#20160f" />
    <title>Other Bali</title>
    <link rel="manifest" href="https://www.otherbali.com/manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #20160f;
        --paper: #f4efe5;
        --muted: #cbbda8;
        --brass: #d7ab66;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 0%, rgba(215, 171, 102, 0.22), transparent 42%),
          var(--bg);
        color: var(--paper);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
      }

      p {
        margin: 0;
        color: var(--muted);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 17px;
        line-height: 1.55;
      }

      h1 {
        margin: 14px 0 18px;
        max-width: 10ch;
        font-size: clamp(48px, 16vw, 76px);
        line-height: 0.96;
        letter-spacing: 0;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        margin-top: 30px;
        border-radius: 999px;
        background: var(--paper);
        color: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 0 22px;
        text-decoration: none;
      }

      .eyebrow {
        color: var(--brass);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }
    </style>
    <script>
      window.location.replace("https://www.otherbali.com/");
    </script>
  </head>
  <body>
    <main>
      <p class="eyebrow">Other Bali</p>
      <h1>The right place for the moment.</h1>
      <p>Opening the live guide...</p>
      <a href="https://www.otherbali.com/">Open Other Bali</a>
    </main>
  </body>
</html>
