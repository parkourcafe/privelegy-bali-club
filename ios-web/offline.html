<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#20160f" />
    <title>Other Bali offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #20160f;
        --paper: #f4efe5;
        --muted: #cbbda8;
        --brass: #d7ab66;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--paper);
        font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      }

      main {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
        justify-content: center;
        padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
      }

      h1 {
        margin: 14px 0 18px;
        max-width: 10ch;
        font-size: clamp(44px, 15vw, 72px);
        line-height: 0.98;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 17px;
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        min-height: 48px;
        width: max-content;
        align-items: center;
        justify-content: center;
        margin-top: 30px;
        border-radius: 999px;
        background: var(--paper);
        color: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 700;
        padding: 0 22px;
        text-decoration: none;
      }

      .eyebrow {
        color: var(--brass);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Other Bali</p>
      <h1>Connect to continue.</h1>
      <p>Other Bali needs the live guide to show current places, routes, and confirmed offers.</p>
      <a href="https://www.otherbali.com/">Try again</a>
    </main>
  </body>
</html>
