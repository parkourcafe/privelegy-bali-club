<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#241a12"/><stop offset="1" stop-color="#15100b"/></linearGradient>
    <linearGradient id="ring" x1="0.12" y1="0.08" x2="0.9" y2="0.96"><stop offset="0" stop-color="#f3d59b"/><stop offset="0.46" stop-color="#d3a55f"/><stop offset="1" stop-color="#a5793b"/></linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#3a2410"/><stop offset="1" stop-color="#e7be79"/></linearGradient>
    <radialGradient id="sun" cx="50%" cy="46%" r="62%"><stop offset="0" stop-color="#fff8e8"/><stop offset="55%" stop-color="#f8d99b"/><stop offset="100%" stop-color="#efc57f"/></radialGradient>
    <clipPath id="disc"><circle cx="256" cy="256" r="119"/></clipPath>
  </defs>
  <rect width="512" height="512"  fill="url(#tile)"/>
  <g clip-path="url(#disc)">
    <!-- sky -->
    <rect x="118" y="118" width="276" height="184" fill="url(#sky)"/>
    <!-- sun: a bold half-disc sitting on the horizon (water fill below covers its lower half) -->
    <circle cx="256" cy="302" r="82" fill="url(#sun)"/>
    <!-- water: one solid dark band with a crisp horizon edge, no fine reflection lines -->
    <rect x="118" y="302" width="276" height="92" fill="#57371a"/>
  </g>
  <!-- the "O" ring -->
  <circle cx="256" cy="256" r="146" fill="none" stroke="url(#ring)" stroke-width="58"/>
</svg>
