name: CI

# Quality gate for every change (audit 2026-07, P0 "no CI"). Runs on PRs and on
# pushes to the main development branches. The build is env-safe: the app guards
# every Supabase call behind isSupabaseConfigured() and falls back to seed data,
# and the prebuild scene-fetch no-ops without network — so no secrets are needed
# to lint, typecheck, or build.

on:
  workflow_dispatch:
    inputs:
      run_ios_archive:
        description: "Run the unsigned iOS device-archive verification job (uses billed macOS minutes)"
        required: false
        default: false
        type: boolean
  pull_request:
  push:
    branches:
      - main
      - master
      - "release/**"
      # Development happens on claude/* branches — run CI there too so problems
      # surface before a PR is opened.
      - "claude/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # CI intentionally builds without Supabase credentials to prove the
      # seed-data fallback path stays green.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Partner portal boundary tests
        run: npm test

      - name: Build
        run: npm run build

  android:
    name: Capacitor Android lint · tests · debug package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies and sync the bundled mobile shell
        run: |
          npm ci
          npm run mobile:build
          npm run mobile:sync:android

      - name: Lint and assemble debug package
        working-directory: android
        run: ./gradlew --no-daemon lint test assemblePlayDebug

      - name: Confirm release signing fails closed without secrets
        working-directory: android
        run: |
          if ./gradlew --no-daemon bundlePlayRelease; then
            echo "Google Play upload signing unexpectedly passed without protected secrets."
            exit 1
          fi
          test ! -f app/build/outputs/bundle/playRelease/app-play-release.aab
          if ./gradlew --no-daemon assembleRustoreRelease; then
            echo "RuStore signing unexpectedly passed without protected secrets."
            exit 1
          fi
          test ! -f app/build/outputs/apk/rustore/release/app-rustore-release.apk

  ios-archive:
    name: iOS unsigned device archive · privacy · shell
    if: github.event_name == 'workflow_dispatch' && inputs.run_ios_archive
    runs-on: macos-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and inspect unsigned Release device archive
        run: npm run ios:archive:dry

      - name: Re-run the built-app release guard
        run: node scripts/ci-ios-release-guard.mjs artifacts/ios/App.xcarchive/Products/Applications/App.app

      - name: Upload privacy evidence
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-release-evidence-${{ github.sha }}
          path: artifacts/ios/privacy-evidence.json
          if-no-files-found: error
          retention-days: 14
